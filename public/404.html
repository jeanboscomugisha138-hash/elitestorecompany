<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Loading...</title>
    <script>
      // GitHub Pages / static host SPA fallback: preserve path + query then redirect to root
      var l = window.location;
      var path = l.pathname + l.search + l.hash;
      sessionStorage.setItem('spa-redirect', path);
      l.replace('/');
    </script>
  </head>
  <body></body>
</html>
